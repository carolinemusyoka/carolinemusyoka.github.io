# Site Settings
title: "Carol Musyoka"
description: "Travel, photography, and stories from around the world."
url: "https://carolinemusyoka.github.io"
baseurl: ""
email: carolmusyoka127@gmail.com
favicon: /assets/images/favicon.ico

# Author
author:
  name: Carol Musyoka
  bio: "Photographer, traveler, storyteller. Capturing moments and writing about the places that move me."
  avatar: /assets/images/avatar1.jpg
  email: carolmusyoka127@gmail.com
  social:
    twitter: https://twitter.com/carolmusyoka_
    instagram: "#"
    github: https://github.com/carolinemusyoka

# Build
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 6
paginate_path: "/articles/page:num/"

# Collections
collections:
  gallery:
    output: false

include: ["_pages"]

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: "_posts"
    values:
      layout: post
      author: Carol Musyoka
  - scope:
      path: "_pages"
    values:
      layout: page

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
