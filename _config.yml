# Site Settings
title: "Carol Musyoka"
description: "Travel, photography, and stories from around the world."
url: "https://carolinemusyoka.github.io"
baseurl: ""
email: carolmusyoka127@gmail.com
favicon: /assets/images/favicon.ico

# Author
author:
  name: Carol Musyoka
  bio: "Photographer, traveler, storyteller. Capturing moments and writing about the places that move me."
  avatar: https://ik.imagekit.io/ngmub3qdz/tr:w-560,h-560,fo-face,f-auto,q-80/avatar.jpg
  email: carolmusyoka127@gmail.com
  social:
    twitter: https://twitter.com/carolmusyoka_
    instagram: "#"
    github: https://github.com/carolinemusyoka

# Build
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 6
paginate_path: "/articles/page:num/"

# Collections
collections:
  gallery:
    output: false

include: ["_pages"]

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: "_posts"
    values:
      layout: post
      author: Carol Musyoka
  - scope:
      path: "_pages"
    values:
      layout: page

imagekit_url: "https://ik.imagekit.io/ngmub3qdz"

# Spotify Playlists (paste just the playlist ID from the URL)
# e.g. for https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M → use 37i9dQZF1DXcBWIGoYBM5M
spotify:
  playlist_1: ""
  playlist_2: ""
  playlist_3: ""

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
